      .ax { stroke: #222; stroke-width: 1; fill: none; }
      .lb { font: 11px sans-serif; fill: #222; }
      .tx { font: 12px sans-serif; fill: #222; }
    </style>
  </defs>
  <rect x="0" y="0" width="360" height="320" fill="#fafafa"/>
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="240" height="240" fill="#ffffff" stroke="#222" stroke-width="1.5"/>
    <g fill="none" stroke="#2266cc" stroke-width="1">
      <path d="M40,120 Q120,30 200,120 Q120,210 40,120 Z"/>
      <path d="M55,120 Q120,50 185,120 Q120,190 55,120 Z"/>
      <path d="M70,120 Q120,70 170,120 Q120,170 70,120 Z"/>
      <path d="M85,120 Q120,90 155,120 Q120,150 85,120 Z"/>
