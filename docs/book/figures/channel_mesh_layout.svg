<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 220" width="480" height="220" role="img" aria-label="Structured 16x4 channel mesh layout">
  <defs>
    <style>
      .ax { stroke: #222; stroke-width: 1; fill: none; }
      .tx { font: 12px sans-serif; fill: #222; }
      .lb { font: 10px sans-serif; fill: #222; }
      .wall { stroke: #2266cc; stroke-width: 2; fill: #dde5f0; }
      .cell { stroke: #888; stroke-width: 0.4; fill: #ffffff; }
    </style>
  </defs>
  <rect x="0" y="0" width="480" height="220" fill="#fafafa"/>
  <g transform="translate(60,60)">
    <rect x="0" y="0" width="384" height="120" class="wall"/>
    <g class="cell">
      <rect x="24" y="20" width="336" height="20"/>
      <rect x="24" y="40" width="336" height="20"/>
      <rect x="24" y="60" width="336" height="20"/>
      <rect x="24" y="80" width="336" height="20"/>
    </g>
    <g font-size="9" fill="#444" text-anchor="middle">
      <text x="36" y="34">1</text><text x="60" y="34">2</text><text x="84" y="34">3</text>
      <text x="108" y="34">4</text><text x="132" y="34">5</text><text x="156" y="34">6</text>
      <text x="180" y="34">7</text><text x="204" y="34">8</text><text x="228" y="34">9</text>
      <text x="252" y="34">10</text><text x="276" y="34">11</text><text x="300" y="34">12</text>
      <text x="324" y="34">13</text><text x="348" y="34">14</text><text x="372" y="34">15</text>
    </g>
    <text class="tx" x="390" y="130" text-anchor="end">x</text>
    <text class="tx" x="-6" y="-4" text-anchor="end">y</text>
    <text class="lb" x="0" y="-4">y=H (wall)</text>
    <text class="lb" x="0" y="130">y=0 (wall)</text>
    <text class="lb" x="384" y="130" text-anchor="end">x=L</text>
    <text class="lb" x="190" y="-12" text-anchor="middle">dx = L/16   dy = H/4</text>
  </g>
  <text class="tx" x="20" y="20">Structured rectangular mesh 16 x 4</text>
</svg>
